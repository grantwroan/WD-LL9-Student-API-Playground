<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- The signature yellow frame, in the spirit of the magazine's cover border -->
  <div class="frame">

    <header class="masthead">
      <p class="eyebrow">FIELD GUIDE &middot; VOL. 01</p>
      <h1 class="title">COUNTRY EXPLORER</h1>
      <p class="subtitle">Dispatch reports from anywhere on Earth</p>
    </header>

    <main>
      <!-- SEARCH -->
      <section class="search-panel" aria-label="Search for a country">
        <label for="countryInput" class="search-label">Enter a country name</label>
        <div class="search-row">
          <input
            type="text"
            id="countryInput"
            placeholder="e.g. Kenya, Japan, Peru..."
            autocomplete="off"
          >
          <button id="searchBtn" type="button">Explore</button>
        </div>
      </section>

      <!-- LOADING STATE -->
      <div id="loading" class="loading hidden">
        <span class="compass" aria-hidden="true">&#9678;</span>
        <span>Charting course&hellip;</span>
      </div>

      <!-- ERROR STATE -->
      <div id="errorMessage" class="error hidden" role="alert"></div>

      <!-- RESULT CARD -->
      <section id="resultCard" class="result-card hidden" aria-live="polite">

        <img id="flagImg" class="flag" src="" alt="">

        <h2 id="countryName" class="country-name"></h2>

        <dl class="stat-grid">
          <div class="stat">
            <dt>Capital</dt>
            <dd id="capitalValue">&mdash;</dd>
          </div>
          <div class="stat">
            <dt>Region</dt>
            <dd id="regionValue">&mdash;</dd>
          </div>
          <div class="stat">
            <dt>Population</dt>
            <dd id="populationValue">&mdash;</dd>
          </div>
        </dl>

        <div class="languages-block">
          <dt>Languages</dt>
          <dd id="languagesValue">&mdash;</dd>
        </div>

      </section>
    </main>

    <footer class="masthead-footer">
      <p>Data courtesy of the REST Countries API</p>
    </footer>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
